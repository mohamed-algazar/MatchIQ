<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Shape -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)" />
  
  <!-- Stylized Pitch Pattern -->
  <rect x="10" y="10" width="80" height="80" rx="4" fill="none" stroke="white" stroke-width="0.5" opacity="0.1" />
  <line x1="50" y1="10" x2="50" y2="90" stroke="white" stroke-width="0.5" opacity="0.1" />
  <circle cx="50" cy="50" r="15" fill="none" stroke="white" stroke-width="0.5" opacity="0.1" />
  
  <!-- Hexagonal / Football Geometric Motif -->
  <path d="M50 25 L71.65 37.5 L71.65 62.5 L50 75 L28.35 62.5 L28.35 37.5 Z" fill="url(#primaryGrad)" filter="url(#glow)" />
  
  <!-- Center Star/Dot for AI/Precision -->
  <circle cx="50" cy="50" r="5" fill="white" />
  <path d="M50 35 L50 42 M50 58 L50 65 M35 50 L42 50 M58 50 L65 50" stroke="white" stroke-width="2" stroke-linecap="round" />
  
  <!-- Glossy Overlay -->
  <path d="M24 24 Q50 10 76 24" fill="none" stroke="white" stroke-width="1" opacity="0.1" stroke-linecap="round" />
</svg>
